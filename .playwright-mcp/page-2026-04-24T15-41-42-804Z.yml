            - paragraph [ref=e175]: Ich begleite pädagogische Fachkräfte und Familien dabei, Kinder von Anfang an bindungs- und bedürfnisorientiert zu begleiten. Besonders die frühen Lebensjahre liegen mir am Herzen, da sie die Grundlage für eine gesunde emotionale und soziale Entwicklung bilden.
