        - generic [ref=e87]:
          - heading "Das Seminar im Überblick" [level=2] [ref=e89]
          - generic [ref=e91]:
            - paragraph [ref=e92]:
              - text: In vielen Kitas lässt sich beobachten, dass der Zeitpunkt des Trockenwerdens immer später einsetzt. Das führt zu neuen Anforderungen im pädagogischen Alltag – von organisatorischen Abläufen bis hin zur gemeinsamen Haltung im Team.
              - text: "Der Schritt hin zur selbstständigen Regulation von Blasen- und Darmfunktion ist ein individueller Reifeprozess. Er ist eng mit verschiedenen Entwicklungsbereichen verknüpft und benötigt vor allem eines: ausreichend Zeit."
            - paragraph [ref=e93]: "Das Webinar gibt pädagogischen Fachkräften Anregungen, Raum für Austausch und praktische Ideen für die tägliche Arbeit. Zudem liefert es Orientierung in der Frage: Wie können wir Kinder behutsam durch diese sensible Entwicklungsphase begleiten – ohne Druck, aber mit fachlicher Klarheit?"
        - generic [ref=e94]:
          - heading "Lernziele" [level=2] [ref=e96]
          - list [ref=e99]:
            - listitem [ref=e100]: Woran lässt sich erkennen, dass ein Kind bereit ist, den Übergang zu Töpfchen oder Toilette zu wagen?
            - listitem [ref=e101]: Wie hängt das Thema mit dem wachsenden Autonomieverhalten von Kindern zusammen?
            - listitem [ref=e102]: Welche Faktoren sollten berücksichtigt werden, um diese Phase unterstützend und respektvoll zu gestalten?
            - listitem [ref=e103]: Und wie gelingt eine vertrauensvolle Zusammenarbeit zwischen Eltern und pädagogischem Personal?
        - generic [ref=e104]:
          - heading "Zielgruppe" [level=2] [ref=e106]
          - generic [ref=e108]: Das Webinar richtet sich an pädagogische Fachkräfte aus Krippe, Kita und Kindertagespflege, die Kinder im Prozess des Trockenwerdens kompetent begleiten möchten und praktische Impulse für den Kita-Alltag suchen.
