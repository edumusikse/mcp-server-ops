                                    - paragraph [ref=f60e2]:
                                      - text: In vielen Kitas lässt sich beobachten, dass der Zeitpunkt des Trockenwerdens immer später einsetzt. Das führt zu neuen Anforderungen im pädagogischen Alltag – von organisatorischen Abläufen bis hin zur gemeinsamen Haltung im Team.
                                      - text: "Der Schritt hin zur selbstständigen Regulation von Blasen- und Darmfunktion ist ein individueller Reifeprozess. Er ist eng mit verschiedenen Entwicklungsbereichen verknüpft und benötigt vor allem eines: ausreichend Zeit."
                                    - paragraph [ref=f60e3]: "Das Webinar gibt pädagogischen Fachkräften Anregungen, Raum für Austausch und praktische Ideen für die tägliche Arbeit. Zudem liefert es Orientierung in der Frage: Wie können wir Kinder behutsam durch diese sensible Entwicklungsphase begleiten – ohne Druck, aber mit fachlicher Klarheit?"
