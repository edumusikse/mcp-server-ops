            - text: rcb-individual-texts-description
            - textbox "rcb-individual-texts-description" [ref=e1769]: "Wir verwenden Cookies und ähnliche Technologien auf unserer Website und verarbeiten personenbezogene Daten von dir (z.B. IP-Adresse), um z.B. Inhalte und Anzeigen zu personalisieren, Medien von Drittanbietern einzubinden oder Zugriffe auf unsere Website zu analysieren. Die Datenverarbeitung kann auch erst in Folge gesetzter Cookies stattfinden. Wir teilen diese Daten mit Dritten, die wir in den Privatsphäre-Einstellungen benennen.<br/><br/>Die Datenverarbeitung kann mit deiner Einwilligung oder auf Basis eines berechtigten Interesses erfolgen, dem du in den Privatsphäre-Einstellungen widersprechen kannst. Du hast das Recht, nicht einzuwilligen und deine Einwilligung zu einem späteren Zeitpunkt zu ändern oder zu widerrufen. Der Widerruf wird sofort wirksam, hat jedoch keine Auswirkungen auf bereits verarbeitete Daten. Weitere Informationen zur Verwendung deiner Daten findest du in unserer {{privacyPolicy}}Datenschutzerklärung{{/privacyPolicy}}.<br/><br/>Im Folgenden findest du eine Übersicht über alle Services, die von dieser Website genutzt werden. Du kannst dir detaillierte Informationen zu jedem Service ansehen und ihm einzeln zustimmen oder von deinem Widerspruchsrecht Gebrauch machen."
