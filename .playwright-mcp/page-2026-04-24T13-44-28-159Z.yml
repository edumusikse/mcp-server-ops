            - text: rcb-banner-texts-data-processing-in-unsafe-countries
            - textbox "rcb-banner-texts-data-processing-in-unsafe-countries" [ref=e1705]: "Einige Services verarbeiten personenbezogene Daten in unsicheren Drittländern. Mit deiner Einwilligung stimmst du auch der Datenverarbeitung gekennzeichneter Services gemäß {{legalBasis}} zu, mit Risiken wie unzureichenden Rechtsmitteln, unbefugtem Zugriff durch Behörden ohne Information oder Widerspruchsmöglichkeit, unbefugter Weitergabe an Dritte und unzureichenden Datensicherheitsmaßnahmen."
            - text: rcb-banner-texts-description
            - textbox "rcb-banner-texts-description" [ref=e1706]: "Wir verwenden Cookies und ähnliche Technologien auf unserer Website und verarbeiten personenbezogene Daten von dir (z.B. IP-Adresse), um z.B. Inhalte und Anzeigen zu personalisieren, Medien von Drittanbietern einzubinden oder Zugriffe auf unsere Website zu analysieren. Die Datenverarbeitung kann auch erst in Folge gesetzter Cookies stattfinden. Wir teilen diese Daten mit Dritten, die wir in den Privatsphäre-Einstellungen benennen.<br/><br/>Die Datenverarbeitung kann mit deiner Einwilligung oder auf Basis eines berechtigten Interesses erfolgen, dem du in den Privatsphäre-Einstellungen widersprechen kannst. Du hast das Recht, nicht einzuwilligen und deine Einwilligung zu einem späteren Zeitpunkt zu ändern oder zu widerrufen. Der Widerruf wird sofort wirksam, hat jedoch keine Auswirkungen auf bereits verarbeitete Daten. Weitere Informationen zur Verwendung deiner Daten findest du in unserer {{privacyPolicy}}Datenschutzerklärung{{/privacyPolicy}}."
            - text: rcb-banner-texts-headline
