            - text: rcb-cookie-policy-h-types-cookies
            - textbox "rcb-cookie-policy-h-types-cookies" [ref=e1730]: Welche Arten von Cookies gibt es?
            - text: rcb-cookie-policy-h-website-operator
            - textbox "rcb-cookie-policy-h-website-operator" [ref=e1731]: Verantwortlicher der Website
            - text: rcb-cookie-policy-id
            - textbox "rcb-cookie-policy-id" [ref=e1732]: "0"
            - text: rcb-cookie-policy-instruction
            - textbox "rcb-cookie-policy-instruction" [ref=e1733]: Mit dieser Cookie-Richtlinie möchten wir erklären, was Cookies und Cookie-ähnliche Technologien sind, wie wir und andere Service Provider sie auf dieser Website verwenden, welche Informationen sie sammeln, wie lange und für welche Zwecke wir sie nutzen.
            - text: rcb-cookie-policy-legal-basis-dsg
            - textbox "rcb-cookie-policy-legal-basis-dsg" [ref=e1734]: Das Setzen und Auslesen von Cookies ist in der Schweiz gemäß Art. 45c lit. b FMG (Fernmeldegesetz) nur dann zulässig, wenn ein Nutzer die Möglichkeit hat, der Verarbeitung von Daten auf der Grundlage einer umfassenden Information über die Zwecke der Verarbeitung zu widersprechen. In Ausnahmefällen muss für die Verarbeitung von personenbezogenen Daten in Cookies in der Schweiz eine Einwilligung eingeholt werden.
            - text: rcb-cookie-policy-legal-basis-gdpr
            - textbox "rcb-cookie-policy-legal-basis-gdpr" [ref=e1735]: "Das Setzen und Auslesen von Cookies ist in der Europäischen Union (EU) und dem Europäischen Wirtschaftsraum (EWR) gemäß {{euLegalBasis}} nur dann zulässig, wenn ein Nutzer seine Einwilligung auf der Grundlage umfassender Informationen über die Zwecke der Verarbeitung gegeben hat. Der Website-Betreiber kann auch Cookies setzen, wenn sie unbedingt notwendig sind, um dir als Nutzer den ausdrücklich angeforderten Service zur Verfügung zu stellen, z. B. die grundlegenden Inhalte dieser Website oder andere unbedingt notwendige Cookies für grundlegende Funktionen der Website, die dir ohne deine Einwilligung angezeigt werden."
            - text: rcb-cookie-policy-manage-cookies
            - textbox "rcb-cookie-policy-manage-cookies" [ref=e1736]: <ul><li><strong>Wie man Cookies in einem Browser entfernt:</strong> Um Cookies von deinem Gerät zu entfernen, kannst du die Browserdaten in den Einstellungen deines Browsers löschen. Dadurch werden alle Cookies von allen Websites, die du besucht hast, gelöscht, möglicherweise auch die gespeicherten Anmeldedaten und Website-Einstellungen. In einigen Browsern kannst du nur die Cookies und ähnliche Daten löschen, ohne den gesamten Browserverlauf zu löschen.</li><li><strong>Wie du Cookies in einem Browser kontrollierst:</strong> Wenn du eine genauere Kontrolle über die Cookies bestimmter Websites haben möchtest, gehe zu den Datenschutz- und Cookie-Einstellungen in deinem Browser. Hier kannst du die Einstellungen für die Verwendung von Cookies auf einzelnen Websites anpassen.</li><li><strong>Wie man Cookies in einem Browser blockiert:</strong> Bei den meisten modernen Browsern kann man in den Einstellungen festlegen, dass keine Cookies auf deinem Gerät gespeichert werden. Das Blockieren von Cookies kann jedoch dazu führen, dass bestimmte Services und Funktionen nicht richtig funktionieren, z. B. die Anmeldung als Nutzer. Für viele Browser gibt es auch Erweiterungen, die das Setzen von Cookies auf Websites blockieren können.</li><li><strong>Wie man Cookies auf dieser Website verwaltet:</strong> Um deine Präferenzen in Bezug auf Cookies auf dieser Website anzupassen, kannst du deine Einstellungen jederzeit ändern, indem du auf den Link im Abschnitt „Rechte des Website-Besuchers“ klickst.</li></li></ul><p>Weitere Informationen über den Umgang mit Cookies findest du unter <a href="https://devowl.io/de/rcb/cookie-handhabung/" target="_blank">devowl.io/de/rcb/cookie-handhabung/</a>.</p>
            - text: rcb-cookie-policy-rights-of-visitor
            - textbox "rcb-cookie-policy-rights-of-visitor" [ref=e1737]: Services und ihre Cookies können auf der Rechtsgrundlage deiner Einwilligung oder eines berechtigten Interesses gesetzt und gelesen werden. Als du diese Website zum ersten Mal besucht hast, wurdest du nach deiner Einwilligung gefragt und hattest die Möglichkeit, der Nutzung bestimmter Services zu widersprechen. Welche Rechtsgrundlage für welchen Service verwendet wird, haben wir in unserem Einwilligungsdialog erklärt.<br /><br />Du hast das Recht, die Historie deiner Entscheidungen einzusehen, deine Datenschutzeinstellungen zu ändern, der Nutzung von Services zu widersprechen und deine Einwilligung jederzeit zu widerrufen. Im Folgenden findest du Möglichkeiten, deine Rechte auszuüben:<br /><ul><li>[rcb-consent type="change" tag="a" text="Privatsphäre-Einstellungen ändern"]</li><li>[rcb-consent type="history" tag="a" text="Historie der Privatsphäre-Einstellungen"]</li><li>[rcb-consent type="revoke" tag="a" text="Einwilligungen widerrufen" successmessage="Du hast die Einwilligung für Services mit dessen Cookies und Verarbeitung personenbezogener Daten erfolgreich widerrufen. Die Seite wird jetzt neu geladen!"]</li></ul>
            - text: rcb-cookie-policy-show-custom-groups
            - textbox "rcb-cookie-policy-show-custom-groups" [ref=e1738]: "1"
            - text: rcb-cookie-policy-table-dark-mode
            - textbox "rcb-cookie-policy-table-dark-mode" [ref=e1739]
            - text: rcb-cookie-policy-types-cookies
            - textbox "rcb-cookie-policy-types-cookies" [ref=e1740]: <ul><li><strong>Essenzielle Cookies</strong> sind für die grundlegende Funktionalität einer Website unverzichtbar und ermöglichen Funktionen wie das Speichern von Anmeldeinformationen oder den Zugang zu sicheren Bereichen der Website. Dazu gehören z. B. Sicherheits-Cookies, die einen Bot, der auf der Website nicht erwünscht ist, identifizieren können, indem sie einen Authentifizierungsschlüssel in einem Cookie speichern.</li><li><strong>Funktionale Cookies</strong> verbessern das Nutzererlebnis, indem sie Informationen und Vorlieben wie Spracheinstellungen oder Einstellungen für das Erscheinungsbild der Website speichern, um eine personalisierte Darstellung zu ermöglichen. Dazu gehören zum Beispiel Präferenz-Cookies, welche die bevorzugte Videoqualität der Nutzer auf einer Website speichern.</li><li><strong>Statistik Cookies</strong> sammeln Daten über die Nutzung einer Website, um Erkenntnisse über das Nutzerverhalten zu gewinnen und die Leistung der Website zu optimieren. Dazu gehört z. B. eine zufällig zugewiesene Nutzer-ID, mit der sich zuordnen lässt, ob du eine Unterseite der Website besucht hast.</li><li><strong>Marketing Cookies</strong> werden verwendet, um das Nutzerverhalten über verschiedene Websites hinweg zu verfolgen und um personalisierte Werbung auf der Grundlage der Interessen und des Surfverhaltens der Nutzer anzuzeigen. Dazu gehören z. B. Werbe-Cookies, die eine Interaktion mit einer Werbung auf der Website speichern und an Werbetreibende weiterleiten, oder ein Chat-System für Fragen vor dem Kauf und den Kundensupport.</li></li></ul>
