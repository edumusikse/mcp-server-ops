            - text: rcb-cookie-duration
            - textbox "rcb-cookie-duration" [ref=e1717]: "365"
            - text: rcb-cookie-policy-additional-content
            - textbox "rcb-cookie-policy-additional-content" [ref=e1718]: "Die Cookie-Richtlinie wurde zuletzt am {{dateOfUpdate}} aktualisiert."
            - text: rcb-cookie-policy-cookie-origin
            - textbox "rcb-cookie-policy-cookie-origin" [ref=e1719]: Auf dieser Website können sowohl der Betreiber der Website als auch Dienste Dritter, die auf dieser Website genutzt werden, Cookies setzen und auf deren Inhalte zugreifen. Wer auf welche Cookies und deren Inhalte zugreifen kann, unterscheidet sich zwischen First-Party- und Third-Party-Cookies. First-Party-Cookies werden von der besuchten Website erstellt und können nur vom Betreiber der Website und den integrierten Diensten Dritter auf dieser Website gelesen werden. Third-Party-Cookies werden in der Regel von Drittanbieter-Diensten auf anderen Domains gesetzt, können auf allen Websites gelesen werden, auf denen der Service, der die Domain steuert, eingebettet ist, und werden z. B. von Werbenetzwerken verwendet, um das Nutzerverhalten über verschiedene Websites hinweg zu verfolgen und personalisierte Werbung anzubieten.
            - text: rcb-cookie-policy-cookie-technology
            - textbox "rcb-cookie-policy-cookie-technology" [ref=e1720]: Cookies sind kleine Einheiten von Informationen, ähnlich wie Textdateien, die auf dem Endgerät gespeichert und gelesen werden können. Sie dienen verschiedenen Zwecken, u. a. der Aufrechterhaltung grundlegender Funktionen der Website, der Sicherheit und des Datenschutzes, der Bereitstellung optionaler Funktionen der Website, der Erfassung statistischer Daten über Besucherströme und der Bereitstellung von Marketingsystemen. Praktische Beispiele dafür, was in Cookies gespeichert werden kann, sind die Speicherung des Login-Status in Benutzerkonten, der Inhalt von Warenkörben in E-Commerce-Plattformen oder eine Nutzer-ID zur Verfolgung des Verhaltens auf der Website.<br /><br />Die Informationen können technisch auf verschiedene Arten gespeichert werden. Die bekanntesten Beispiele dafür sind HTTP-Cookies und Cookie-ähnliche Technologien wie der lokale Speicher, der Sitzungsspeicher oder IndexedDB. Jede Art der Speicherung hat unterschiedliche Eigenschaften, welche die technische Handhabung, die Zugänglichkeit und die zum Zugriff auf die Informationen berechtigten Verantwortlichen bestimmen. Alle diese Arten der Speicherung werden in der Regel unter dem Begriff „Cookies“ zusammengefasst und daher in dieser Cookie-Richtlinie auch so genannt.
            - text: rcb-cookie-policy-diff-privacy-policy
            - textbox "rcb-cookie-policy-diff-privacy-policy" [ref=e1721]: "Diese Cookie-Richtlinie ist eine Ergänzung zur {{privacyPolicy}}Datenschutzerklärung{{/privacyPolicy}} dieser Website. Die Cookie-Richtlinie legt fest, wie eine Website Cookies verwendet und welche Daten sie damit sammelt, während die Datenschutzerklärung einen umfassenderen Überblick über alle Datenverarbeitungsaktivitäten auf der Website und darüber hinaus bietet."
            - text: rcb-cookie-policy-h-cookie-origin
            - textbox "rcb-cookie-policy-h-cookie-origin" [ref=e1722]: Wer kann auf dieser Website Cookies setzen?
            - text: rcb-cookie-policy-h-cookie-technology
            - textbox "rcb-cookie-policy-h-cookie-technology" [ref=e1723]: Was sind Cookies und ähnliche Technologien?
            - text: rcb-cookie-policy-h-diff-privacy-policy
