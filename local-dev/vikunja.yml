name: vikunja-local

services:
  vikunja:
    image: vikunja/vikunja:latest
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "8081:3456"
    volumes:
      - vikunja-data:/app/vikunja/files
    environment:
      VIKUNJA_SERVICE_PUBLICURL: http://vikunja.local:8081
      VIKUNJA_SERVICE_JWTSECRET: localdev123secretkey
      VIKUNJA_SERVICE_ENABLEREGISTRATION: "true"
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: vikunja-db
      VIKUNJA_DATABASE_DATABASE: vikunja
      VIKUNJA_DATABASE_USER: vikunja
      VIKUNJA_DATABASE_PASSWORD: localdev123
    depends_on:
      vikunja-db:
        condition: service_healthy

  vikunja-db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - vikunja-db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: vikunja
      POSTGRES_USER: vikunja
      POSTGRES_PASSWORD: localdev123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vikunja"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vikunja-data:
  vikunja-db:
