name: nextcloud-local

services:
  nextcloud-app:
    image: nextcloud:33-apache
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - nextcloud-data:/var/www/html
    environment:
      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: localdev123
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: localdev123
      NEXTCLOUD_TRUSTED_DOMAINS: nextcloud.local localhost
      OVERWRITEPROTOCOL: http
      OVERWRITECLIURL: http://nextcloud.local:8080
      REDIS_HOST: nextcloud-redis
      REDIS_HOST_PASSWORD: localdev123
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_started

  nextcloud-cron:
    image: nextcloud:33-apache
    restart: unless-stopped
    entrypoint: /cron.sh
    volumes:
      - nextcloud-data:/var/www/html
    depends_on:
      - nextcloud-app

  nextcloud-db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - nextcloud-db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: localdev123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud"]
      interval: 5s
      timeout: 5s
      retries: 10

  nextcloud-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass localdev123

volumes:
  nextcloud-data:
  nextcloud-db:
