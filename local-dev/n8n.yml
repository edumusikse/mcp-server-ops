name: n8n-local

services:
  n8n-app:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "8083:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-db
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: localdev123
      N8N_HOST: n8n.local
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://n8n.local:8083/
      N8N_SECURE_COOKIE: "false"
    depends_on:
      n8n-db:
        condition: service_healthy

  n8n-db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - n8n-db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: localdev123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  n8n-data:
  n8n-db:
